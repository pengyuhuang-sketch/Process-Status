name: 雲端自動打包 EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 使用 PyInstaller 打包成單一 EXE
      run: |
        pyinstaller --onefile --noconsole --log-level=WARN main.py

    - name: 上傳打包好的 EXE 檔案到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ExcelViewer-EXE
        path: dist/main.exe

    - name: 自動發布到 GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "最新編譯版本 (免安裝執行檔)"
        files: dist/main.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
