name: 雲端自動打包 EXE

# 觸發條件：改為當網頁首頁(main分支)有任何檔案變更，或是手動執行時就觸發
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允許我們在網頁上點擊按鈕手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝依賴套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 使用 PyInstaller 打包成 EXE
      run: |
        pyinstaller --onefile --noconsole main.py

    # 💡 這次我們不建立正式 Release，直接把 EXE 存放在 Actions 的產出物中
    - name: 上傳打包好的 EXE 檔案
      uses: actions/upload-artifact@v4
      with:
        name: 工單資料擷取器-電腦執行檔
        path: dist/main.exe
